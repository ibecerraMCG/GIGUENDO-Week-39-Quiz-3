<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 39 Practice Quiz 3</title>

    <style>
        /* --- CSS Variables & Themes --- */
        :root {
            --transition-speed: 0.3s;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* Default Feedback Colors (Fallback for custom themes) */
            --feedback-success-bg: #064e3b;
            --feedback-success-border: #059669;
            --feedback-success-text: #a7f3d0;
            --feedback-error-bg: #7f1d1d;
            --feedback-error-border: #dc2626;
            --feedback-error-text: #fecaca;
        }[data-theme="dark"] {
            --bg-body: #1e293b; --bg-card: #334155; --bg-header: #0f172a;
            --text-main: #f1f5f9; --text-muted: #94a3b8; --text-accent: #38bdf8;
            --border-color: #475569; --highlight-bg: #475569;
            --button-bg: #38bdf8; --button-text: #0f172a; --button-hover: #0ea5e9;
        }[data-theme="light"] {
            --bg-body: #f3f4f6; --bg-card: #ffffff; --bg-header: #ffffff;
            --text-main: #1f2937; --text-muted: #6b7280; --text-accent: #2563eb;
            --border-color: #e5e7eb; --highlight-bg: #f3f4f6;
            --button-bg: #2563eb; --button-text: #ffffff; --button-hover: #1d4ed8;
            --feedback-success-bg: #ecfdf5; --feedback-success-border: #34d399; --feedback-success-text: #065f46;
            --feedback-error-bg: #fef2f2; --feedback-error-border: #f87171; --feedback-error-text: #991b1b;
        }[data-theme="midnight"] {
            --bg-body: #000000; --bg-card: #000000; --bg-header: #000000;
            --text-main: #e0e0e0; --text-muted: #888888; --text-accent: #90caf9;
            --border-color: #333333; --highlight-bg: #1a1a1a;
            --button-bg: #90caf9; --button-text: #000000; --button-hover: #42a5f5;
            --feedback-success-bg: #051b11; --feedback-success-border: #0f5132; --feedback-success-text: #75b798;
            --feedback-error-bg: #2c0b0e; --feedback-error-border: #842029; --feedback-error-text: #ea868f;
        }[data-theme="legacy-dark"] {
            --bg-body: #2d343e; --bg-card: #3c424f; --bg-header: #3c424f;
            --text-main: #e8e6e3; --text-muted: #b0c4de; --text-accent: #8ab4f8;
            --border-color: #555; --highlight-bg: #454c5a;
            --button-bg: #8ab4f8; --button-text: #202124; --button-hover: #a3c5f9;
            --feedback-success-bg: #344e41; --feedback-success-border: #52b788; --feedback-success-text: #c7f9cc;
            --feedback-error-bg: #5e2129; --feedback-error-border: #a4133c; --feedback-error-text: #f8d7da;
        }[data-theme="sepia"] {
            --bg-body: #f4ecd8; --bg-card: #fdf6e3; --bg-header: #e4d5b7;
            --text-main: #433422; --text-muted: #7c6f5a; --text-accent: #a05a2c;
            --border-color: #d3c4a5; --highlight-bg: #ebe1c9;
            --button-bg: #a05a2c; --button-text: #fdf6e3; --button-hover: #864822;
            --feedback-success-bg: #e6f4ea; --feedback-success-border: #8ab893; --feedback-success-text: #2e4c35;
            --feedback-error-bg: #f9e3e3; --feedback-error-border: #d48f8f; --feedback-error-text: #5c2b2b;
        }

        [data-theme="contrast"] {
            --bg-body: #000000; --bg-card: #000000; --bg-header: #000000;
            --text-main: #ffffff; --text-muted: #dddddd; --text-accent: #ffff00;
            --border-color: #ffffff; --highlight-bg: #333333;
            --button-bg: #ffff00; --button-text: #000000; --button-hover: #e6e600;
            --feedback-success-bg: #000000; --feedback-success-border: #00ff00; --feedback-success-text: #00ff00;
            --feedback-error-bg: #000000; --feedback-error-border: #ff0000; --feedback-error-text: #ff0000;
        }

        /* --- Global Reset & Layout --- */
        * { box-sizing: border-box; }
        
        body {
            font-family: var(--font-main);
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            line-height: 1.6;
        }

        /* --- Header --- */
        header {
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        header.unpinned { position: relative; box-shadow: none; }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; flex-wrap: wrap; gap: 15px;
        }

        header h1 { font-size: 1.5rem; margin: 0; color: var(--text-accent); font-weight: 700; }

        .controls-wrapper { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        /* --- Custom Theme Builder --- */
        .custom-builder {
            display: none; flex-wrap: wrap; gap: 15px;
            background-color: var(--bg-card); padding: 10px 15px;
            border-radius: 8px; border: 1px solid var(--border-color);
            margin-top: 5px; font-size: 0.85rem; animation: fadeIn 0.3s;
            width: 100%; justify-content: flex-end;
        }
        .custom-builder.active { display: flex; }
        .color-picker-group { display: flex; align-items: center; gap: 8px; }
        .color-picker-group input[type="color"] {
            border: none; width: 25px; height: 25px; border-radius: 4px;
            cursor: pointer; padding: 0; background: none;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Controls --- */
        .header-btn {
            background-color: var(--highlight-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:hover {
            border-color: var(--text-accent);
            color: var(--text-accent);
        }

        .pin-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-main);
            cursor: pointer; padding: 0 10px; border-radius: 6px; font-size: 1rem;
            transition: background-color 0.2s; height: 34px; display: flex;
            align-items: center; justify-content: center;
        }
        .pin-btn:hover { background-color: var(--highlight-bg); }
        .pin-btn.pin-active { background-color: rgba(0, 0, 0, 0.1); }

        select#theme-select {
            padding: 0 12px; border-radius: 6px; border: 1px solid var(--border-color);
            background-color: var(--bg-card); color: var(--text-main);
            cursor: pointer; font-family: inherit; height: 34px;
        }

        /* --- Section Navigation --- */
        .section-nav { display: flex; gap: 10px; flex-wrap: wrap; }
        .section-nav button {
            background-color: var(--highlight-bg); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.85rem;
            font-weight: 500; transition: all 0.2s;
        }
        .section-nav button:hover { border-color: var(--text-accent); color: var(--text-accent); }

        /* --- Main Content --- */
        .container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 0 1rem 4rem 1rem;
        }

        .section-header {
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--text-accent);
            color: var(--text-accent);
            font-size: 1.5rem;
            font-weight: 700;
            scroll-margin-top: 150px; /* Offset for sticky header */
        }

        /* --- Question Card --- */
        .question-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .lo-box {
            background-color: var(--highlight-bg);
            border-left: 4px solid var(--text-accent);
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
            display: none; /* Hidden by default */
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* --- Options --- */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            background-color: var(--highlight-bg);
            border-color: var(--text-muted);
        }

        .option-label input {
            margin-top: 0.3rem;
            margin-right: 1rem;
            accent-color: var(--text-accent);
            transform: scale(1.2);
        }

        /* --- Buttons --- */
        .btn-check {
            margin-top: 1.5rem;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-check:hover {
            opacity: 0.9;
        }

        .btn-link {
            display: inline-block;
            background-color: var(--button-bg);
            color: var(--button-text);
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-link:hover {
            opacity: 0.9;
        }

        /* --- Feedback Area --- */
        .feedback {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            display: none; /* Hidden by default */
            border: 1px solid transparent;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.correct {
            background-color: var(--feedback-success-bg);
            border-color: var(--feedback-success-border);
            color: var(--feedback-success-text);
        }

        .feedback.incorrect {
            background-color: var(--feedback-error-bg);
            border-color: var(--feedback-error-border);
            color: var(--feedback-error-text);
        }

        .feedback-header {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .rationale {
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        .source {
            display: block;
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.8;
            font-style: italic;
            border-top: 1px dashed currentColor;
            padding-top: 0.5rem;
        }

        /* --- Mobile Tweaks --- */
        @media (max-width: 768px) {
            .header-top { flex-direction: column; align-items: flex-start; }
            .controls-wrapper { width: 100%; justify-content: flex-start; }
            .section-nav { justify-content: flex-start; }
            .custom-builder { justify-content: flex-start; }
            header h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <h1>Week 39 Practice Quiz 3</h1>
            <div class="controls-wrapper">
                
                <!-- Reveal LOs Button -->
                <button id="reveal-all-btn" class="header-btn" onclick="toggleAllLOs()">Show Learning Objectives</button>
                
                <!-- Pin Button -->
                <button class="pin-btn pin-active" id="pin-btn" onclick="toggleHeader()" title="Pin/Unpin Header">📌</button>
                
                <!-- Theme Selector -->
                <div class="theme-control">
                    <select id="theme-select" onchange="changeTheme(this.value)">
                        <option value="dark">Modern Dark</option>
                        <option value="midnight">Midnight</option>
                        <option value="light">Modern Light</option>
                        <option value="legacy-dark">Legacy Dark</option>
                        <option value="sepia">Sepia</option>
                        <option value="contrast">High Contrast</option>
                        <option value="custom">⚙️ Custom...</option>
                    </select>
                </div>
            </div>
            
            <!-- Custom Theme Color Pickers -->
            <div class="custom-builder" id="custom-builder">
                <div class="color-picker-group">
                    <label>Background:</label>
                    <input type="color" id="color-bg" value="#1a1a2e" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Cards:</label>
                    <input type="color" id="color-card" value="#16213e" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Text:</label>
                    <input type="color" id="color-text" value="#e94560" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Accent:</label>
                    <input type="color" id="color-accent" value="#0f3460" oninput="updateCustomTheme()">
                </div>
            </div>
        </div>
        
        <!-- Dynamic Navigation Bar -->
        <div class="section-nav" id="section-nav"></div>
    </header>

    <div class="container">
        <div id="quiz-root">
            <!-- Content injected via JS -->
        </div>
    </div>

    <script>
        // --- Data ---
        const quizData =[
            // --- Section 1: Cytochrome P450 Liver Metabolism ---
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO1: Describe drug (xenobiotic) metabolism (biotransformation)",
                question: "A 45-year-old man receives a highly lipid-soluble medication for a systemic infection. In order for this drug to be readily excreted by the renal system in his urine, it must first undergo biotransformation to become water-soluble. This critical process of drug metabolism primarily takes place in which of the following organs?",
                options: {
                    A: "Brain",
                    B: "Heart",
                    C: "Kidney",
                    D: "Liver",
                    E: "Lungs"
                },
                correctAnswer: "D",
                rationale: "The liver is the primary site of drug metabolism (biotransformation), where lipid or fat-soluble xenobiotics are converted into water-soluble derivatives so they can be readily excreted by the renal system.",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 5: 'Biotransformation: In many tissues... Liver is the major organ for drug metabolism'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO1: Describe drug (xenobiotic) metabolism (biotransformation)",
                question: "A physician prescribes a new medication to a patient and is evaluating how the drug is absorbed, distributed, metabolized, and excreted by the patient's body. These four processes will ultimately determine the active availability of the drug and the appropriate dosage. Which of the following terms best describes this overarching concept?",
                options: {
                    A: "Bioavailability",
                    B: "Glucuronidation",
                    C: "Pharmacodynamics",
                    D: "Pharmacokinetics",
                    E: "Therapeutic window"
                },
                correctAnswer: "D",
                rationale: "Pharmacokinetics (PK) describes what our body does to a drug, encompassing the four processes of Absorption, Distribution, Metabolism, and Excretion (ADME). This determines the dose, duration, and conversion of prodrugs.",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 6: 'Pharmacokinetics (PK): What our body does to a drug (ADME)... Determines Dose & Duration (How often & how much)'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO2: Describe the differences between Phase I and Phase II drug and xenobiotic metabolism.",
                question: "A 55-year-old woman is taking a medication that undergoes two distinct phases of hepatic metabolism. During the first step, a cytochrome P450 enzyme adds a hydroxyl group to the drug molecule. What is the most likely result of this specific Phase I reaction?",
                options: {
                    A: "Attachment of a glucuronic acid residue",
                    B: "Conversion of a fat-soluble drug into a polar metabolite",
                    C: "Immediate excretion of the intact drug into the feces",
                    D: "Terminal inactivation of the drug for renal clearance",
                    E: "Transport of the drug into chylomicrons"
                },
                correctAnswer: "B",
                rationale: "Phase I drug metabolism is mediated by CYP450 enzymes, which convert fat-soluble drugs into polar (water-soluble) metabolites, typically by adding a hydroxyl group. Phase II is the terminal transformation.",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 11: 'Phase I: CYP450 enzyme mediated... Converts fat soluble drugs into polar metabolites'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO2: Describe the differences between Phase I and Phase II drug and xenobiotic metabolism.",
                question: "A patient receives an active drug that is subsequently inactivated and prepared for renal excretion. This terminal biotransformation step (Phase II) involves the addition of a sugar molecule to a hydroxyl group on the drug to make it highly water-soluble. Which of the following reactions best describes this process?",
                options: {
                    A: "Acetylation",
                    B: "Deamination",
                    C: "Glucuronidation",
                    D: "Hydroxylation",
                    E: "Sulfation"
                },
                correctAnswer: "C",
                rationale: "Glucuronidation is a typical Phase II terminal biotransformation that involves the addition of glucuronic acid (a sugar molecule) to the –OH group of the drug, rendering it non-toxic and ready for excretion in the urine.",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 19: 'Glucuronidation: Addition of glucuronic acid (a sugar molecule) to the –OH group.'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO3: Define CYP450 enzymes and describe the nomenclature system used to classify them.",
                question: "A pharmacology student is reviewing the properties of the enzyme superfamily responsible for the majority of Phase I drug metabolism. These enzymes are named for a specific characteristic observed when carbon monoxide binds to the ferrous group in their essential co-factor. Which of the following is this essential co-factor?",
                options: {
                    A: "Copper",
                    B: "Flavin adenine dinucleotide",
                    C: "Heme",
                    D: "Pyridoxal phosphate",
                    E: "Zinc"
                },
                correctAnswer: "C",
                rationale: "CYP450 enzymes require a heme co-factor. The name \"CYP450\" is derived from the fact that when carbon monoxide binds to the Fe2+ in the heme group, these enzymes show an absorption maximum peak at 450 nm.",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 12: 'Why the name? CYP450... Have heme co-factor: Similarity to other CYtochromes... When carbon monoxide binds Fe2+ in the heme group, CYPs show absorption maximum “Peak at 450 nm”'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO3: Define CYP450 enzymes and describe the nomenclature system used to classify them.",
                question: "A researcher is studying the hepatic metabolism of a novel drug by the cytochrome P450 enzyme designated as CYP3A4. Based on the standardized nomenclature system for this superfamily, the letter \"A\" indicates that this enzyme belongs to a specific group that shares what percentage of amino acid homology?",
                options: {
                    A: "< 10%",
                    B: "10% - 20%",
                    C: "20% - 30%",
                    D: "40% - 55%",
                    E: "> 90%"
                },
                correctAnswer: "D",
                rationale: "In the nomenclature of CYP450 enzymes (e.g., CYP3A4), the letter (A) denotes the subfamily. Each member within a subfamily shares 40-55% amino acid homology. The first number (3) denotes the family (at least 40% homology).",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 15: 'The letter (A in the illustration) denotes the subfamily. Each subfamily member has 40-55% amino acid homology'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO4: Identify the tissue and subcellular distribution of CYP450 enzymes and discuss the enzyme reaction mediated by them.",
                question: "A cell biologist isolates hepatocytes to study the biotransformation of a new xenobiotic. She determines that the primary enzyme responsible is a transmembrane protein located in the smooth endoplasmic reticulum (SER). For this CYP450 enzyme to function properly in the SER, it requires an electron provider partner. Which of the following is the correct partner?",
                options: {
                    A: "Cytochrome c oxidase",
                    B: "Glutathione-S-transferase",
                    C: "NADH dehydrogenase",
                    D: "NADPH-adrenodoxin reductase",
                    E: "NADPH-CYP450 reductase"
                },
                correctAnswer: "E",
                rationale: "In the smooth endoplasmic reticulum, CYP450 enzymes partner with NADPH-CYP450 reductase, which provides the necessary electrons for the metabolic reaction. (In the mitochondria, the partner is NADPH-adrenodoxin reductase).",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 13: 'Partner: Electron provider... In SER: NADPH-CYP450 reductase... In mitochondria: NADPH-adrenodoxin reductase'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO4: Identify the tissue and subcellular distribution of CYP450 enzymes and discuss the enzyme reaction mediated by them.",
                question: "A newly developed lipid-soluble drug is metabolized by a CYP450 enzyme in the liver. During the basic reaction, the enzyme utilizes NADPH, H+, and molecular oxygen (O2) to create a water-soluble product (Drug-OH). Because these enzymes add exactly one oxygen atom into the drug substrate, they are formally classified as:",
                options: {
                    A: "Dehydrogenases",
                    B: "Hydrolases",
                    C: "Monooxygenases",
                    D: "Oxidoreductases",
                    E: "Transferases"
                },
                correctAnswer: "C",
                rationale: "CYP450 enzymes add a single hydroxyl group (-OH) to xenobiotics/drugs. Because they add one oxygen molecule to the substrate, they are classified as monooxygenases.",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 14: 'Since CYPs add one oxygen molecule they are monooxygenases'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO5: Discuss the clinical relevance of the drug metabolism function of the CYP450 enzymes.",
                question: "A 40-year-old man is prescribed codeine for a severe cough. Codeine is an inactive prodrug that must be converted by the CYP2D6 enzyme into its active form, morphine, to exert its therapeutic effect. If this patient has advanced alcoholic liver disease that severely impairs his hepatic CYP450 function, which of the following is the most likely outcome of administering a standard dose of codeine?",
                options: {
                    A: "Dangerously high plasma levels of active morphine",
                    B: "Decreased prodrug conversion and therapy failure",
                    C: "Rapid clearance of the drug by the kidneys",
                    D: "Severe hepatotoxicity leading to acute liver failure",
                    E: "Sudden respiratory depression and coma"
                },
                correctAnswer: "B",
                rationale: "Codeine is a prodrug. Liver disease decreases drug metabolism. Therefore, the conversion of the prodrug (codeine) to the active drug (morphine) decreases, leading to therapy failure.",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 8: 'Liver disease (alcoholic, non-alcoholic): prodrug -> drug ;  drug metabolism'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO5: Discuss the clinical relevance of the drug metabolism function of the CYP450 enzymes.",
                question: "A 65-year-old woman with chronic kidney disease (CKD) is prescribed a standard dose of an active medication that is known to be metabolized and excreted by the renal system. Due to her impaired renal function, the excretion of the drug and its metabolites is significantly reduced. Which of the following is the most likely consequence of administering this active drug?",
                options: {
                    A: "Decreased drug absorption",
                    B: "Decreased drug half-life",
                    C: "Increased conversion to a prodrug",
                    D: "Increased drug toxicity",
                    E: "Increased Phase I metabolism"
                },
                correctAnswer: "D",
                rationale: "In a patient with kidney disease (CKD), excretion and drug metabolism in the kidney are decreased. For an active drug, this leads to an accumulation of the drug in the body, resulting in increased toxicity.",
                source: "Cytochrome P450 & Drug Metabolism.pdf, Slide 8: 'Kidney disease (CKD):  Excretion & drug metabolism   toxicity'"
            },
            {
                section: "Cytochrome P450 Liver Metabolism",
                fullLO: "LO6: Discuss the role of CYP450 enzymes in the generation of carcinogens, activation of therapeutic drugs: Tylenol‐induced liver toxicity and drug‐drug interactions.",
                question: "A 50-year-old man consumes a diet high in charred, well-done steak. The polycyclic aromatic hydrocarbons (PAH) in the meat are converted by CYP1A1 into epoxides, which can intercalate into DNA and cause mutations leading to cancer. Fortunately, his body can detoxify these epoxides through a conjugation reaction mediated by which of the following Phase II enzymes?",

            const returnBtn = document.createElement('a');
            returnBtn.href = 'https://ibecerramcg.github.io/GI-GU-ENDO-Practice-Quizzes/';
            returnBtn.className = 'btn-link';
            returnBtn.textContent = '← Return to Quiz Directory';
            
            returnContainer.appendChild(returnBtn);
            quizRoot.appendChild(returnContainer);

            const savedTheme = localStorage.getItem('quizTheme') || 'dark';
            themeSelect.value = savedTheme;
            changeTheme(savedTheme);

            const savedPinState = localStorage.getItem('headerPinned');
            toggleHeader(savedPinState !== 'false');
        }

        function checkAnswer(index) {
            const selected = document.querySelector(`input[name="question-${index}"]:checked`);
            const feedbackEl = document.getElementById(`feedback-${index}`);
            const data = quizData[index];

            if (!selected) {
                alert("Please select an answer.");
                return;
            }

            const isCorrect = selected.value === data.correctAnswer;
            
            let html = `<span class="feedback-header">${isCorrect ? "Correct!" : "Incorrect"}</span>`;
            if (!isCorrect) {
                html += `<div>The correct answer is <strong>${data.correctAnswer}</strong>.</div>`;
            }
            
            html += `<div class="rationale"><strong>Rationale:</strong> ${data.rationale}</div>`;
            html += `<div class="source"><strong>Source:</strong> ${data.source}</div>`;

            feedbackEl.innerHTML = html;
            feedbackEl.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedbackEl.style.display = 'block';
        }

        function changeTheme(themeName) {
            localStorage.setItem('quizTheme', themeName);
            
            if (themeName === 'custom') {
                rootElements.removeAttribute('data-theme');
                customBuilder.classList.add('active');
                loadCustomTheme();
            } else {
                rootElements.setAttribute('data-theme', themeName);
                customBuilder.classList.remove('active');
                rootElements.removeAttribute('style');
            }
        }

        function updateCustomTheme() {
            const bg = document.getElementById('color-bg').value;
            const card = document.getElementById('color-card').value;
            const text = document.getElementById('color-text').value;
            const accent = document.getElementById('color-accent').value;

            rootElements.style.setProperty('--bg-body', bg);
            rootElements.style.setProperty('--bg-header', bg);
            rootElements.style.setProperty('--bg-card', card);
            rootElements.style.setProperty('--highlight-bg', card);
            rootElements.style.setProperty('--text-main', text);
            rootElements.style.setProperty('--text-accent', accent);
            rootElements.style.setProperty('--button-bg', accent);
            rootElements.style.setProperty('--button-text', bg);
            rootElements.style.setProperty('--border-color', accent + '40');

            const customColors = { bg, card, text, accent };
            localStorage.setItem('customThemeColors', JSON.stringify(customColors));
        }

        function loadCustomTheme() {
            const savedColors = JSON.parse(localStorage.getItem('customThemeColors'));
            if (savedColors) {
                document.getElementById('color-bg').value = savedColors.bg;
                document.getElementById('color-card').value = savedColors.card;
                document.getElementById('color-text').value = savedColors.text;
                document.getElementById('color-accent').value = savedColors.accent;
                updateCustomTheme();
            } else {
                updateCustomTheme();
            }
        }

        function toggleHeader(forceState) {
            const isCurrentlyPinned = !mainHeader.classList.contains('unpinned');
            const newState = (typeof forceState === 'boolean') ? forceState : !isCurrentlyPinned;

            if (newState) {
                mainHeader.classList.remove('unpinned');
                pinBtn.classList.add('pin-active');
                localStorage.setItem('headerPinned', 'true');
            } else {
                mainHeader.classList.add('unpinned');
                pinBtn.classList.remove('pin-active');
                localStorage.setItem('headerPinned', 'false');
            }
        }

        document.addEventListener('DOMContentLoaded', initQuiz);

    </script>
</body>
</html>
